<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autoTD 管理台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主要内容</a>
    <header class="topbar">
      <div>
        <p class="eyebrow">本地 Web 端</p>
        <h1>autoTD 管理台</h1>
      </div>
      <div class="toolbar" aria-label="全局操作">
        <button id="refresh-button" type="button">刷新</button>
        <button id="background-button" type="button">运行后台</button>
        <button id="run-once-button" type="button">今日打卡</button>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <div id="notice" class="notice" role="status" aria-live="polite">正在读取本地状态</div>

      <section class="status-band" aria-labelledby="status-title">
        <h2 id="status-title">运行状态</h2>
        <dl class="status-grid">
          <div>
            <dt>后台进程</dt>
            <dd id="background-status">-</dd>
          </div>
          <div>
            <dt>配置目录</dt>
            <dd id="home-path">-</dd>
          </div>
          <div>
            <dt>最近刷新</dt>
            <dd id="refreshed-at">-</dd>
          </div>
        </dl>
      </section>

      <section class="split-layout">
        <div class="panel" aria-labelledby="users-title">
          <div class="section-head">
            <div>
              <p class="eyebrow">用户</p>
              <h2 id="users-title">用户列表与今日进度</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">学号</th>
                  <th scope="col">今日打卡进度</th>
                  <th scope="col">TD 数</th>
                  <th scope="col">下一步</th>
                  <th scope="col">状态说明</th>
                  <th scope="col">操作</th>
                </tr>
              </thead>
              <tbody id="users-body"></tbody>
            </table>
          </div>
        </div>

        <form id="add-user-form" class="panel form-panel" aria-labelledby="add-user-title">
          <p class="eyebrow">Quick 配置</p>
          <h2 id="add-user-title">新增用户</h2>
          <div class="field">
            <label for="student-id">学号</label>
            <input id="student-id" name="student_id" autocomplete="off" inputmode="numeric" required />
          </div>
          <div class="field">
            <label for="campus">校区</label>
            <select id="campus" name="campus" required>
              <option value="学院路">学院路</option>
              <option value="沙河">沙河</option>
            </select>
          </div>
          <button type="submit">新增用户</button>
        </form>
      </section>

      <section class="panel image-panel" aria-labelledby="images-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">图片</p>
            <h2 id="images-title">图片管理</h2>
          </div>
        </div>
        <form id="image-form" class="image-upload-panel">
          <div class="field">
            <label for="image-input">本地图片</label>
            <input id="image-input" name="image" type="file" accept="image/*" required />
          </div>
          <label class="inline-check">
            <input id="overwrite-image" name="overwrite" type="checkbox" />
            覆盖同名
          </label>
          <button type="submit">上传图片</button>
        </form>
        <div id="image-grid" class="image-grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
